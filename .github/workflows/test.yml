name: Run tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project and dependencies
        run: python -m pip install -e .

      - name: Install coverage tool
        run: python -m pip install coverage

      - name: Set up coverage with relative paths
        run: |
          cat > .coveragerc << 'EOF'
          [run]
          relative_files = True
          EOF

      - name: Run tests with coverage
        run: python -m coverage run -m unittest discover -s tests -v

      - name: Dump _resolve coverage (debug)
        run: |
          python -m coverage json -o cov.json
          python3 -c "
          import json
          with open('cov.json') as f:
              data = json.load(f)
          for fp, info in data.get('files', {}).items():
              if '_resolve' in fp:
                  s = info['summary']
                  print(f'  {fp}: {s[\"percent_covered\"]:.0f}% ({s[\"covered_lines\"]}/{s[\"num_statements\"]})')
                  print(f'  missing: {info.get(\"missing_lines\", [])}')
                  print(f'  excluded: {info.get(\"excluded_lines\", [])}')
          " || true

      - name: Report coverage
        run: python -m coverage report --fail-under=70 --skip-covered

      - name: Upload .coverage artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: dot-coverage-${{ matrix.os }}-${{ matrix.python-version }}
          path: .coverage
          include-hidden-files: true

      - name: Dump XML for Codecov
        run: python -m coverage xml -o coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7.0.0
        with:
          files: coverage.xml
          fail_ci_if_error: false
