name: Run tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project and dependencies
        run: python -m pip install -e .

      - name: Install coverage tool
        run: python -m pip install coverage

      - name: Set up coverage config
        run: |
          cat > .coveragerc << 'EOF'
          [run]
          relative_files = True
          source = rawblock_io
          EOF

      - name: Run tests with coverage
        run: python -m coverage run -m unittest discover -s tests -v

      - name: Report coverage
        run: python -m coverage report --fail-under=70 --skip-covered

      - name: Upload coverage data
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-${{ matrix.os }}-${{ matrix.python-version }}
          path: .coverage
          include-hidden-files: true

  coverage-report:
    name: Coverage report (combined)
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install coverage tool
        run: python -m pip install coverage

      - name: Set up coverage config
        run: |
          cat > .coveragerc << 'EOF'
          [run]
          relative_files = True
          source = rawblock_io
          EOF

      - name: Download all coverage data
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: coverage-*

      - name: Combine coverage data across OS and Python versions
        run: coverage combine coverage-*/.coverage

      - name: Report combined coverage
        run: python -m coverage report --fail-under=80 --skip-covered

      - name: Generate XML coverage report
        run: python -m coverage xml

      - name: Upload coverage XML artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7.0.0
        with:
          files: coverage.xml
          fail_ci_if_error: true
