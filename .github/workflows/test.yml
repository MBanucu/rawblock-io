name: Run tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project and dependencies
        run: python -m pip install -e .

      - name: Install coverage tool
        run: python -m pip install coverage

      - name: Set up coverage with relative paths
        run: |
          cat > .coveragerc << 'EOF'
          [run]
          relative_files = True
          EOF

      - name: Run tests with coverage
        run: python -m coverage run -m unittest discover -s tests -v

      - name: Report coverage
        run: python -m coverage report --fail-under=70 --skip-covered

      - name: Dump XML for Codecov
        run: python -m coverage xml -o coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7.0.0
        with:
          files: coverage.xml
          fail_ci_if_error: false

  result:
    name: All tests
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All ${{ needs.test.result }}"
